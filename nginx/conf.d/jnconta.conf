upstream api {
    server jnconta-api:3000;
}

upstream frontend {
    server jnconta-frontend:3000;
}

# Redirigir HTTP → HTTPS
server {
    listen 80;
    server_name jnconta.com www.jnconta.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://jnconta.com$request_uri;
    }
}

# Redirigir www → apex
server {
    listen 443 ssl http2;
    server_name www.jnconta.com;

    ssl_certificate     /etc/letsencrypt/live/jnconta.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jnconta.com/privkey.pem;

    return 301 https://jnconta.com$request_uri;
}

# Servidor principal HTTPS
server {
    listen 443 ssl http2;
    server_name jnconta.com;

    ssl_certificate     /etc/letsencrypt/live/jnconta.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jnconta.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    client_max_body_size 25M;

    # Webhook Stripe — body sin modificar (sin buffering)
    location /api/subscriptions/webhook {
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
    }

    # API → NestJS
    location /api/ {
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Frontend → Next.js
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
